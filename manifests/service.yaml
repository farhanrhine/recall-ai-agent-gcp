apiVersion: v1
kind: Service
metadata:
  name: recall-app-service
spec:
  selector:
    app: recall-app
  ports:
    - port: 80
      targetPort: 8080  # Container port where Recall AI Agent runs
  type: NodePort  # Change from ClusterIP to NodePort to allow external access.
                  # In production, prefer LoadBalancer or Ingress with a domain
                  # and SSL certificate for secure and scalable access.