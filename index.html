<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tutor | SFA</title>
    <!-- Use a clean font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <!-- Markdown support -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --border: #e0e0e0;
            --accent: #2563eb;
            --chat-bg: #f8fafc;
            --quiz-bg: #ffffff;
            --user-msg: #eff6ff;
            --assistant-msg: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            color: var(--text);
            background: var(--bg);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
        }

        .tagline {
            color: #666;
            font-size: 0.875rem;
        }

        main {
            display: flex;
            flex: 1;
            overflow: hidden;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        #chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            padding: 1.5rem;
            background: var(--chat-bg);
        }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding-right: 1rem;
            margin-bottom: 1.5rem;
        }

        .message {
            margin-bottom: 1.5rem;
            padding: 1rem 1.25rem;
            border-radius: 12px;
            max-width: 85%;
            font-size: 0.95rem;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .user {
            background: var(--user-msg);
            margin-left: auto;
            border: 1px solid #dbeafe;
        }

        .assistant {
            background: var(--assistant-msg);
            margin-right: auto;
            border: 1px solid var(--border);
        }

        .assistant pre {
            background: #f1f5f9;
            padding: 1rem;
            border-radius: 6px;
            overflow-x: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }

        .input-area {
            display: flex;
            gap: 0.75rem;
            background: #fff;
            padding: 0.75rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        input[type="text"] {
            flex: 1;
            border: none;
            outline: none;
            font-size: 0.95rem;
            font-family: inherit;
        }

        button {
            padding: 0.6rem 1.25rem;
            background: var(--text);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        button:hover {
            background: #333;
            transform: translateY(-1px);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        #assessment-container {
            width: 400px;
            padding: 1.5rem;
            overflow-y: auto;
            background: var(--quiz-bg);
        }

        .quiz-card {
            background: #fff;
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1rem;
        }

        .option-label {
            display: block;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin: 0.5rem 0;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .option-label:hover {
            border-color: var(--accent);
            background: #f8fafc;
        }

        .option-label input {
            margin-right: 0.75rem;
        }

        .correct {
            background: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534;
        }

        .wrong {
            background: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b;
        }

        .quiz-trigger-btn {
            display: none;
            width: 100%;
            background: var(--accent);
            margin-top: 1rem;
        }

        .score-display {
            text-align: center;
            padding: 1rem;
            background: var(--accent);
            color: #fff;
            border-radius: 8px;
            font-weight: 600;
            margin-top: 1rem;
        }

        /* Markdown Overrides */
        .assistant p {
            margin-top: 0;
        }

        .assistant ul,
        .assistant ol {
            padding-left: 1.5rem;
        }
    </style>
</head>

<body>

    <header>
        <div>
            <h1>🎓 Intelligent AI Tutor</h1>
            <div class="tagline">Single-File Architecture (SFA) Mode</div>
        </div>
        <button onclick="resetSession()" style="background:none; color:#666; border:1px solid #ddd;">Reset</button>
    </header>

    <main>
        <section id="chat-container">
            <div id="chat-window"></div>
            <div class="input-area">
                <input type="text" id="user-input" placeholder="What do you want to learn today?">
                <button id="send-btn">Send</button>
            </div>
            <button id="start-quiz-btn" class="quiz-trigger-btn">🚀 Start Contextual Quiz</button>
        </section>

        <section id="assessment-container">
            <h3>📝 Assessment Center</h3>
            <div id="quiz-ui">
                <p style="color: #666; font-size: 0.9rem;">Teach the AI a topic first. When you're ready, the quiz will
                    appear here.</p>
            </div>
        </section>
    </main>

    <script>
        let messages = [];

        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const startQuizBtn = document.getElementById('start-quiz-btn');
        const quizUI = document.getElementById('quiz-ui');

        // Initialize marked
        marked.setOptions({ gfm: true, breaks: true });

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage('user', text);
            userInput.value = '';
            setLoading(true);

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages })
                });

                if (!response.ok) throw new Error('Backend failed');

                const data = await response.json();
                addMessage('assistant', data.content);

                // Detect if the AI suggested a quiz
                const lowerContent = data.content.toLowerCase();
                if (lowerContent.includes('quiz') || lowerContent.includes('test') || lowerContent.includes('button below')) {
                    startQuizBtn.style.display = 'block';
                }
            } catch (err) {
                addMessage('assistant', '⚠️ **Error:** I lost connection to the server. Please check if `api.py` is running.');
            } finally {
                setLoading(false);
            }
        }

        function addMessage(role, content) {
            messages.push({ role, content });
            const div = document.createElement('div');
            div.className = `message ${role}`;

            if (role === 'assistant') {
                div.innerHTML = marked.parse(content);
            } else {
                div.textContent = content;
            }

            chatWindow.appendChild(div);
            // Smooth scroll
            chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
        }

        function setLoading(loading) {
            sendBtn.disabled = loading;
            userInput.disabled = loading;
            sendBtn.textContent = loading ? '...' : 'Send';
        }

        function resetSession() {
            messages = [];
            chatWindow.innerHTML = '';
            quizUI.innerHTML = '<p style="color: #666; font-size: 0.9rem;">Session reset. Ready for a new topic!</p>';
            startQuizBtn.style.display = 'none';
        }

        startQuizBtn.onclick = async () => {
            quizUI.innerHTML = '<div class="quiz-card" style="text-align:center;">Building your quiz... 🧠</div>';
            startQuizBtn.style.display = 'none';

            try {
                const response = await fetch('/api/quiz', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages })
                });
                const data = await response.json();
                renderQuiz(data.questions);
            } catch (err) {
                quizUI.innerHTML = '<div class="quiz-card" style="color:red;">Error building quiz. Try clarifying the topic first.</div>';
            }
        };

        function renderQuiz(questions) {
            quizUI.innerHTML = `
                <div class="score-display" id="score-box" style="display:none; margin-bottom:1rem;"></div>
            `;

            questions.forEach((q, qIndex) => {
                const card = document.createElement('div');
                card.className = 'quiz-card';
                card.innerHTML = `<p><strong>Q${qIndex + 1}: ${q.question}</strong></p>`;

                q.options.forEach(opt => {
                    const label = document.createElement('label');
                    label.className = 'option-label';
                    label.innerHTML = `
                        <input type="radio" name="q${qIndex}" value="${opt.replace(/"/g, '&quot;')}">
                        <span>${opt}</span>
                    `;
                    card.appendChild(label);
                });
                quizUI.appendChild(card);
            });

            const submitBtn = document.createElement('button');
            submitBtn.id = 'final-submit-btn';
            submitBtn.textContent = 'Submit Assessment 🚀';
            submitBtn.style.width = '100%';
            submitBtn.onclick = () => gradeQuiz(questions);
            quizUI.appendChild(submitBtn);
        }

        function gradeQuiz(questions) {
            let score = 0;
            let answeredCount = 0;

            questions.forEach((q, i) => {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                const options = document.querySelectorAll(`input[name="q${i}"]`);

                if (selected) answeredCount++;

                options.forEach(opt => {
                    const label = opt.parentElement;
                    const val = opt.value.trim().toLowerCase();
                    const correct = q.correct_answer.trim().toLowerCase();

                    if (val === correct) {
                        label.classList.add('correct');
                    }
                    if (selected && opt === selected && val !== correct) {
                        label.classList.add('wrong');
                    }
                    opt.disabled = true;
                });

                if (selected && selected.value.trim().toLowerCase() === q.correct_answer.trim().toLowerCase()) {
                    score++;
                }
            });

            if (answeredCount < questions.length) {
                alert("Please answer all questions first!");
                return;
            }

            const scoreBox = document.getElementById('score-box');
            scoreBox.style.display = 'block';
            scoreBox.textContent = `Result: ${score} / ${questions.length} Correct`;

            document.getElementById('final-submit-btn').style.display = 'none';
        }

        sendBtn.onclick = sendMessage;
        userInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
    </script>
</body>

</html>
